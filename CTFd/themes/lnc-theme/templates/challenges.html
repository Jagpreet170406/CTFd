{% extends "base.html" %}

{% block content %}
<style>
  .jumbotron {
    background-color: transparent !important;
    border-bottom: 1px solid rgba(155,48,255,0.15) !important;
    padding-top: 48px !important;
    padding-bottom: 24px !important;
  }

  .jumbotron h1 {
    font-family: 'Orbitron', monospace !important;
    font-weight: 900 !important;
    color: #fff !important;
    letter-spacing: 0.08em !important;
  }

  .category-header h3 {
    font-family: 'Share Tech Mono', monospace !important;
    font-size: 0.78rem !important;
    font-weight: 400 !important;
    letter-spacing: 0.3em !important;
    text-transform: uppercase !important;
    color: #9b30ff !important;
  }

  .challenge-button {
    background-color: #0a0f1a !important;
    border: 1px solid rgba(155,48,255,0.2) !important;
    border-top: 2px solid rgba(155,48,255,0.4) !important;
    border-radius: 0 !important;
    transition: border-color 0.2s, background-color 0.2s !important;
  }

  .challenge-button:hover {
    background-color: rgba(155,48,255,0.08) !important;
    border-top-color: #ff1a2e !important;
    border-color: rgba(155,48,255,0.4) !important;
  }

  .challenge-solved {
    border-top-color: #00ff88 !important;
    background-color: rgba(0,255,136,0.04) !important;
  }

  .challenge-inner p {
    font-family: 'Orbitron', monospace !important;
    font-size: 0.78rem !important;
    font-weight: 700 !important;
    color: #fff !important;
    margin-bottom: 10px !important;
  }

  .challenge-inner span {
    font-family: 'Share Tech Mono', monospace !important;
    font-size: 1.1rem !important;
    color: #ff1a2e !important;
  }

  .spinner { color: #9b30ff !important; }
</style>

  <div class="jumbotron">
    <div class="container">
      <h1>
        {% trans %}Challenges{% endtrans %}
      </h1>
    </div>
  </div>

  <div class="container">
    <div class="row">
      <div class="col-md-12">
        {% include "components/errors.html" %}
      </div>
    </div>

    <div 
      x-data="ChallengeBoard" 
      @load-challenges.window="loadChallenges()" 
      @load-challenge.window="loadChallenge($event.detail)"
    >
      <div
          x-ref="challengeWindow" id="challenge-window" class="modal fade" tabindex="-1" role="dialog" x-data=""
          x-html="$store.challenge.data.view"
      ></div>

      <div x-show="!loaded">
        <div class="min-vh-50 d-flex align-items-center">
          <div class="text-center w-100">
            <i class="fas fa-circle-notch fa-spin fa-3x fa-fw spinner"></i>
          </div>
        </div>
      </div>

      <div x-show="loaded">
        <template x-for="(category, idx) in getCategories()" :key="idx">
          <div class="pt-5">
            <div class="category-header mb-3">
              <h3 x-text="category"></h3>
            </div>

            <div class="category-challenges d-flex flex-column">
              <div class="challenges-row row">
                <template x-for="(c, idx) in getChallenges(category)" :key="c.id">
                  <div class="col-sm-6 col-md-4 col-lg-3 my-3">
                    <button
                        class="challenge-button btn btn-dark w-100 h-100"
                        :class="[
                          c.solved_by_me ? 'challenge-solved' : '',
                          ...c.tags.map((tag) => `tag-${tag.value.replace(/ /g, '-')}`),
                        ];"
                        :value="c.id" @click="loadChallenge(c.id)"
                    >

                      <div class="challenge-inner my-3">
                        <p x-text="c.name"></p>
                        <span x-text="c.value"></span>
                      </div>
                    </button>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  {{ Assets.js("assets/js/challenges.js") }}
{% endblock %}
